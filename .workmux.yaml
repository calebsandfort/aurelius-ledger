files:
  copy:
    - .env
    - frontend/.env
    - backend/.env
    - .envrc
    - frontend/.envrc
    - backend/.envrc

post_create:
  - chmod +x scripts/worktree-env scripts/worktree-setup scripts/start-backend
  - ./scripts/worktree-env
  - ./scripts/worktree-setup

pre_merge:
  - docker compose down 2>/dev/null || true

pre_remove:
  - docker compose down 2>/dev/null || true

panes:
  - command: claude
    focus: true
  - split: horizontal
  - command: cd frontend && pnpm dev
    split: vertical
  - command: ./scripts/start-backend
    split: vertical
