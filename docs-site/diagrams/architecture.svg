<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0F172A"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#F8FAFC" font-size="24" font-weight="bold" font-family="Inter, sans-serif">
    Aurelius Ledger - System Architecture
  </text>

  <!-- Frontend Container -->
  <rect x="40" y="80" width="200" height="480" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="140" y="110" text-anchor="middle" fill="#3B82F6" font-size="16" font-weight="bold" font-family="Inter, sans-serif">
    Frontend (Next.js)
  </text>

  <!-- Frontend Components -->
  <rect x="60" y="130" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="140" y="160" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    UI Components
  </text>

  <rect x="60" y="195" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="140" y="225" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    API Routes
  </text>

  <rect x="60" y="260" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="140" y="290" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    Better Auth
  </text>

  <rect x="60" y="325" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="140" y="355" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    Drizzle ORM
  </text>

  <rect x="60" y="390" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="140" y="420" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    CopilotKit
  </text>

  <rect x="60" y="455" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="140" y="485" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    TanStack Query
  </text>

  <!-- Arrows from Frontend -->
  <path d="M200 280 L300 280" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M200 405 L300 355" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Database Container -->
  <rect x="560" y="200" width="200" height="200" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="660" y="230" text-anchor="middle" fill="#8B5CF6" font-size="16" font-weight="bold" font-family="Inter, sans-serif">
    Database
  </text>

  <rect x="580" y="250" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="660" y="280" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    TimescaleDB
  </text>

  <rect x="580" y="315" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="660" y="345" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    PostgreSQL 16
  </text>

  <!-- Backend Container -->
  <rect x="300" y="80" width="200" height="200" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" fill="#10B981" font-size="16" font-weight="bold" font-family="Inter, sans-serif">
    Backend (FastAPI)
  </text>

  <rect x="320" y="130" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="400" y="160" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    API Endpoints
  </text>

  <rect x="320" y="195" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="400" y="225" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    LangGraph Agents
  </text>

  <rect x="320" y="260" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="400" y="290" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    Extraction Agent
  </text>

  <!-- Arrow from Backend to Database -->
  <path d="M500 180 L560 180" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M500 285 L560 285" stroke="#10B981" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Arrow from Database to Frontend -->
  <path d="M560 300 L300 360" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow-purple)" stroke-dasharray="4"/>

  <!-- LLM Container -->
  <rect x="300" y="350" width="200" height="120" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <text x="400" y="380" text-anchor="middle" fill="#F59E0B" font-size="16" font-weight="bold" font-family="Inter, sans-serif">
    AI Services
  </text>

  <rect x="320" y="395" width="160" height="50" rx="4" fill="#0F172A" stroke="#475569" stroke-width="1"/>
  <text x="400" y="425" text-anchor="middle" fill="#E2E8F0" font-size="12" font-family="Inter, sans-serif">
    OpenAI GPT-4
  </text>

  <!-- Arrow from Backend to LLM -->
  <path d="M400 310 L400 350" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow-yellow)"/>

  <!-- Legend -->
  <rect x="40" y="540" width="720" height="40" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <circle cx="60" cy="560" r="4" fill="#3B82F6"/>
  <text x="75" y="564" fill="#94A3B8" font-size="10" font-family="Inter, sans-serif">API Request</text>

  <circle cx="160" cy="560" r="4" fill="#10B981"/>
  <text x="175" y="564" fill="#94A3B8" font-size="10" font-family="Inter, sans-serif">DB Query</text>

  <circle cx="270" cy="560" r="4" fill="#F59E0B"/>
  <text x="285" y="564" fill="#94A3B8" font-size="10" font-family="Inter, sans-serif">LLM Call</text>

  <circle cx="380" cy="560" r="4" fill="#8B5CF6"/>
  <text x="395" y="564" fill="#94A3B8" font-size="10" font-family="Inter, sans-serif">Response</text>

  <!-- Arrow Markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F59E0B"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8B5CF6"/>
    </marker>
  </defs>
</svg>
